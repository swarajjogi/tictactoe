<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="container">

    <h1>Tic Tac Toe</h1>

    <!-- Status bar -->
    <div class="status" th:classappend="${game.gameOver} ? 'status--over' : 'status--playing'">
        <span th:if="${!game.winner.isEmpty()}">
            Player <strong th:text="${game.winner}"></strong> wins! 🎉
        </span>
        <span th:if="${game.draw}">
            It's a draw! 🤝
        </span>
        <span th:if="${!game.gameOver}">
            Player <strong th:text="${game.currentPlayer}"></strong>'s turn
        </span>
    </div>

    <!-- Board -->
    <div class="board">

        <!-- Row 0 -->
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="0"/>
            <button type="submit" class="cell"
                    th:text="${game.board[0]}"
                    th:classappend="(${game.board[0] == 'X'} ? ' cell--x' : '') + (${game.board[0] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(0)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[0].isEmpty() or game.gameOver}"></button>
        </form>
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="1"/>
            <button type="submit" class="cell"
                    th:text="${game.board[1]}"
                    th:classappend="(${game.board[1] == 'X'} ? ' cell--x' : '') + (${game.board[1] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(1)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[1].isEmpty() or game.gameOver}"></button>
        </form>
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="2"/>
            <button type="submit" class="cell"
                    th:text="${game.board[2]}"
                    th:classappend="(${game.board[2] == 'X'} ? ' cell--x' : '') + (${game.board[2] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(2)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[2].isEmpty() or game.gameOver}"></button>
        </form>

        <!-- Row 1 -->
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="3"/>
            <button type="submit" class="cell"
                    th:text="${game.board[3]}"
                    th:classappend="(${game.board[3] == 'X'} ? ' cell--x' : '') + (${game.board[3] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(3)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[3].isEmpty() or game.gameOver}"></button>
        </form>
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="4"/>
            <button type="submit" class="cell"
                    th:text="${game.board[4]}"
                    th:classappend="(${game.board[4] == 'X'} ? ' cell--x' : '') + (${game.board[4] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(4)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[4].isEmpty() or game.gameOver}"></button>
        </form>
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="5"/>
            <button type="submit" class="cell"
                    th:text="${game.board[5]}"
                    th:classappend="(${game.board[5] == 'X'} ? ' cell--x' : '') + (${game.board[5] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(5)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[5].isEmpty() or game.gameOver}"></button>
        </form>

        <!-- Row 2 -->
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="6"/>
            <button type="submit" class="cell"
                    th:text="${game.board[6]}"
                    th:classappend="(${game.board[6] == 'X'} ? ' cell--x' : '') + (${game.board[6] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(6)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[6].isEmpty() or game.gameOver}"></button>
        </form>
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="7"/>
            <button type="submit" class="cell"
                    th:text="${game.board[7]}"
                    th:classappend="(${game.board[7] == 'X'} ? ' cell--x' : '') + (${game.board[7] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(7)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[7].isEmpty() or game.gameOver}"></button>
        </form>
        <form th:action="@{/game/move}" method="post" class="cell-form">
            <input type="hidden" name="index" value="8"/>
            <button type="submit" class="cell"
                    th:text="${game.board[8]}"
                    th:classappend="(${game.board[8] == 'X'} ? ' cell--x' : '') + (${game.board[8] == 'O'} ? ' cell--o' : '') + (${game.isWinningCell(8)} ? ' cell--win' : '')"
                    th:disabled="${!game.board[8].isEmpty() or game.gameOver}"></button>
        </form>

    </div>

    <!-- Reset button -->
    <form th:action="@{/game/reset}" method="post" class="reset-form">
        <button type="submit" class="btn-reset">New Game</button>
    </form>

    <p class="hint">X always goes first</p>

</div>

</body>
</html>
